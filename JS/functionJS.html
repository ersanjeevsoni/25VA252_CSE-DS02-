<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Function in JS</title>
</head>
<body>
    
    <script>
        //Function:-A JavaScript function is a reusable block of code designed to perform a specific task

        //normal function without para

        function demo(){
            console.log("Hello JS" );
        }
 demo();
               //normal function with para
        function demo1(text){
            console.log("Hello " + text);
        }
          demo1("React");

          // function with default parameters
          function add(a,b=10){
            console.log("addtion of two number is " + (a+b));
          }
          add(3);

          // An anonymous function in JavaScript is a function that does not have an identifier (name) associated with it. These functions are primarily used for one-time tasks or scenarios where a function is passed as a value, such as callbacks, event handlers, or Immediately Invoked Function Expressions (IIFE)

          let cal=function(){
             var num1=5;
             var num2=10;
             var res=num1*num2;
             console.log("multiply of num1 and num2 " + res );
          }
          cal();
          // arrow function with multiline statement
          //Arrow functions were introduced in ES6 as a concise alternative to traditional function expressions, using the => syntax. They are widely used in modern JavaScript, especially for short functions and callbacks.
          let div=(x,y)=>{
            var num1=x;
            var num2=y;
            var res=x/y;
            console.log("Divison is " + res);
          }
          div(12,3);
           // arrow function with single line statement
let msg=()=>console.log("Hello ABES");
msg();
//callback function: A callback function is a function passed as an argument into another function. A callback function is intended to be executed later.

function sub(callback){
    var num1=10;
    var num2=20;
    var res=num1-num2;
    callback(res);

}
function displayRes(res){
    console.log("Result is " + res);
}
sub(displayRes);
//callback using setTimeout API

function msg1(){
    console.log("Hello Frnd");
}
setTimeout(msg1,2000)
    </script>
</body>
